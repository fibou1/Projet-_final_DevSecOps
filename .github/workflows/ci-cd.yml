name: CI/CD Pipeline

on:
  push:
    branches: [ main, Robert ]

jobs:
  security-and-testing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Security Scans
        run: echo "Scans terminés"

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: security-and-testing
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Frontend
        run: echo "Frontend déployé"

  deploy-backend:
    runs-on: ubuntu-latest
    needs: security-and-testing
    steps:
      - uses: actions/checkout@v4
      - name: Setup SOPS
        uses: mdgreenwald/mozilla-sops-action@v1
      - name: Déchiffrement & Déploiement Vercel
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          eval $(sops -d --output-type dotenv .github/secrets-prod.yaml | awk '{print "export " $0}')
          VERCEL_URL=$(npx vercel deploy --prod --token $VERCEL_TOKEN --cwd backend --env DATABASE_URL=$DATABASE_URL)
          echo "VERCEL_URL=$VERCEL_URL" >> $GITHUB_ENV
      - name: Healthcheck
        run: curl -f -s "$VERCEL_URL/api/health"