name: CI/CD

on:
  push:
    branches: [staging, main]

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'

  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://localhost/test
      JWT_SECRET: dummy-ci-secret
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Installer les dependances
        run: npm ci
        working-directory: backend

      - name: Lancer les tests
        run: npm test
        working-directory: backend

  gitleaks-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: gitleaks.toml

  codeql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - uses: github/codeql-action/analyze@v3

  scan-image:
    needs: [test, changes]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image (local, non publiée)
        run: docker build -t backend:${{ github.sha }} ./backend

      - name: Générer le SBOM CycloneDX
        uses: anchore/sbom-action@v0
        with:
          image: backend:${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - name: Scan Trivy (image)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: backend:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Analyse SBOM via Composite Action
        uses: ./.github/actions/trivy-scan
        with:
          sbom-path: sbom.cdx.json

      - name: Exporter l'image en fichier tar
        run: docker save backend:${{ github.sha }} -o backend-image.tar

      - name: Upload de l'image en artefact
        uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: backend-image.tar
          retention-days: 1

  publish:
    needs: [scan-image]
    if: success()
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Télécharger l'artefact image
        uses: actions/download-artifact@v4
        with:
          name: backend-image

      - name: Charger l'image Docker
        run: docker load -i backend-image.tar

      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Tag et push
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/${OWNER}/devsecops-backend"
          docker tag backend:${{ github.sha }} ${IMAGE_NAME}:${{ github.sha }}
          docker push ${IMAGE_NAME}:${{ github.sha }}

  deploy-backend:
    needs: [test, gitleaks-ci, codeql]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "Tout vas bien !"
